version: '3.8'

services:
  jira-dashboard:
    # Thay 'thongpham95' bằng username Docker Hub thực tế của bạn
    image: ${DOCKER_USERNAME:-thongpham95}/ai-jira-dashboard:latest
    container_name: jira-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
